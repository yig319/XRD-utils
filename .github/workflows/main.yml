name: CI and Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  release:
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (
        contains(github.event.head_commit.message, '#major') ||
        contains(github.event.head_commit.message, '#minor') ||
        contains(github.event.head_commit.message, '#patch')
      )
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compute and push next version tag
        id: version
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          if [[ "$COMMIT_MESSAGE" == *"#major"* ]]; then
            bump="major"
          elif [[ "$COMMIT_MESSAGE" == *"#minor"* ]]; then
            bump="minor"
          else
            bump="patch"
          fi

          head_tag="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n 1)"

          if [[ -n "$head_tag" ]]; then
            latest_tag="$head_tag"
            new_tag="$head_tag"
            created_tag="false"
          else
            latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
            if [[ -z "$latest_tag" ]]; then
              latest_tag="v0.0.0"
            fi

            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"

            case "$bump" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                new_tag="v${major}.${minor}.${patch}"
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                new_tag="v${major}.${minor}.${patch}"
                ;;
              patch)
                patch=$((patch + 1))
                new_tag="v${major}.${minor}.${patch}"
                ;;
            esac
            created_tag="true"
          fi

          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "created_tag=$created_tag" >> "$GITHUB_OUTPUT"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if [[ "$created_tag" == "true" ]]; then
            git tag "$new_tag"
            git push origin "$new_tag"
          else
            echo "HEAD already tagged with $new_tag; reusing tag."
          fi

      - name: Build package from tagged commit
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
          python -m build
          python -m twine check dist/*

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
